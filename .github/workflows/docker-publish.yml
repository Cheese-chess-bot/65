name: Build and Push to GHCR

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cheese-chess-bot/rtq-smart-router

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Upgraded to v4 (Fully compliant with modern node runners)
      - name: Checkout repository
        uses: actions/checkout@v6

      # Upgraded to v4 to fully support native Node 24 routing
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Upgraded to v4 to remove legacy internal engine wrappers
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Upgraded to v7 to shift default runtime to Node 24 completely
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
